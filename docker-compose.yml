# One command to run the whole app locally:  docker compose up --build
# Web on http://localhost:3000, processing server on http://localhost:4000.
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      HOST: "0.0.0.0"
      # Allow the browser app (served from :3000) to call the API.
      CORS_ORIGINS: "http://localhost:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Baked into the client bundle at build time. The browser runs on the
        # host, so it reaches the server via the published port on localhost.
        NEXT_PUBLIC_API_URL: "http://localhost:4000"
    ports:
      - "3000:3000"
    depends_on:
      - server

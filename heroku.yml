# Deploys the processing backend to Heroku as a container, built remotely from
# Dockerfile.server (no local Docker needed). The client deploys to Vercel.
# NB: Heroku uses the Dockerfile's directory as the build context, so the
# monorepo Dockerfiles live at the repo root.
#
#   heroku create <app> && heroku stack:set container -a <app>
#   heroku config:set CORS_ORIGINS=https://<your-vercel-app>.vercel.app -a <app>
#   git push heroku main
#
# The server reads $PORT (set by Heroku) and binds 0.0.0.0 — see apps/server/src/config.ts.
build:
  docker:
    web: Dockerfile.server
